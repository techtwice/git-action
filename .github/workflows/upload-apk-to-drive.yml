name: Upload APK Folder to Google Drive

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  upload-to-drive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash
          rclone --version

      - name: Upload ApkFile Folder to Google Drive
        env:
          GDRIVE_SA_KEY: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_KEY }}
        run: |
          # Write service account key (printenv avoids shell escaping issues)
          printenv GDRIVE_SA_KEY > /tmp/sa_key.json

          # Verify the JSON is valid
          python3 -c "import json; json.load(open('/tmp/sa_key.json')); print('SA key JSON is valid')"

          # Create rclone config
          mkdir -p ~/.config/rclone
          printf '[gdrive]\ntype = drive\nservice_account_file = /tmp/sa_key.json\nroot_folder_id = 1ZE5bxcjgUTVRtdUS-BwWqgZkANQEDC0T\n' > ~/.config/rclone/rclone.conf

          # Upload ApkFile folder
          rclone copy ApkFile/ gdrive: --verbose

          # Clean up
          rm -f /tmp/sa_key.json
