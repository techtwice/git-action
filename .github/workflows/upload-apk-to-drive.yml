name: Upload APK Folder to Google Drive

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  upload-to-drive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install rclone
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y rclone
          echo "rclone version: $(rclone --version | head -1)"

      - name: Check secret is set
        env:
          GDRIVE_SA_KEY: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_KEY }}
        run: |
          if [ -z "$GDRIVE_SA_KEY" ]; then
            echo "ERROR: GDRIVE_SERVICE_ACCOUNT_KEY secret is empty or not set!"
            exit 1
          fi
          echo "Secret is present (length: ${#GDRIVE_SA_KEY})"

      - name: Write and validate service account key
        env:
          GDRIVE_SA_KEY: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_KEY }}
        run: |
          printenv GDRIVE_SA_KEY > /tmp/sa_key.json
          echo "Key file size: $(wc -c < /tmp/sa_key.json) bytes"
          python3 -c "
          import json
          with open('/tmp/sa_key.json') as f:
              data = json.load(f)
          print('JSON valid. client_email:', data.get('client_email'))
          print('project_id:', data.get('project_id'))
          print('type:', data.get('type'))
          "

      - name: Create rclone config
        run: |
          mkdir -p ~/.config/rclone
          echo '[gdrive]'                                              > ~/.config/rclone/rclone.conf
          echo 'type = drive'                                         >> ~/.config/rclone/rclone.conf
          echo 'service_account_file = /tmp/sa_key.json'             >> ~/.config/rclone/rclone.conf
          echo 'root_folder_id = 1ZE5bxcjgUTVRtdUS-BwWqgZkANQEDC0T' >> ~/.config/rclone/rclone.conf
          echo "rclone config written:"
          cat ~/.config/rclone/rclone.conf

      - name: Test Google Drive connection
        run: |
          echo "Testing connection to Google Drive folder..."
          rclone lsd gdrive: --log-level INFO || {
            echo "ERROR: Cannot connect to Google Drive."
            echo "Make sure the service account has been shared on the Drive folder."
            exit 1
          }

      - name: List ApkFile folder contents
        run: |
          echo "Files to upload:"
          ls -lh ApkFile/ || echo "(folder is empty)"

      - name: Upload ApkFile to Google Drive
        run: |
          rclone copy ApkFile/ gdrive: --log-level INFO --stats 5s
          echo "Upload complete."

      - name: Cleanup
        if: always()
        run: rm -f /tmp/sa_key.json
