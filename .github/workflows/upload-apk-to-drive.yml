name: Upload APK Folder to Google Drive

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  upload-to-drive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install rclone
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y rclone
          echo "rclone version: $(rclone --version | head -1)"

      - name: Check secrets are set
        env:
          GDRIVE_OAUTH_TOKEN: ${{ secrets.GDRIVE_OAUTH_TOKEN }}
        run: |
          if [ -z "$GDRIVE_OAUTH_TOKEN" ]; then
            echo "ERROR: GDRIVE_OAUTH_TOKEN secret is empty or not set!"
            exit 1
          fi
          echo "Secret is present (length: ${#GDRIVE_OAUTH_TOKEN})"

      - name: Create rclone config
        env:
          GDRIVE_OAUTH_TOKEN: ${{ secrets.GDRIVE_OAUTH_TOKEN }}
        run: |
          mkdir -p ~/.config/rclone
          echo '[gdrive]'                                                > ~/.config/rclone/rclone.conf
          echo 'type = drive'                                           >> ~/.config/rclone/rclone.conf
          echo 'scope = drive'                                          >> ~/.config/rclone/rclone.conf
          echo 'root_folder_id = 1ZE5bxcjgUTVRtdUS-BwWqgZkANQEDC0T'   >> ~/.config/rclone/rclone.conf
          echo "token = $GDRIVE_OAUTH_TOKEN"                           >> ~/.config/rclone/rclone.conf
          echo "rclone config written (token hidden)"

      - name: Test Google Drive connection
        run: |
          echo "Testing connection to Google Drive folder..."
          rclone lsd gdrive: --log-level INFO || {
            echo "ERROR: Cannot connect to Google Drive."
            echo "Make sure the service account has been shared on the Drive folder."
            exit 1
          }

      - name: List ApkFile folder contents
        run: |
          echo "Files to upload:"
          ls -lh ApkFile/ || echo "(folder is empty)"

      - name: Upload ApkFile to Google Drive
        run: |
          rclone copy ApkFile/ gdrive: --log-level INFO --stats 5s
          echo "Upload complete."

      - name: Cleanup
        if: always()
        run: rm -f ~/.config/rclone/rclone.conf
