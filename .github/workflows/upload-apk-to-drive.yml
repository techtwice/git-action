name: Upload APK Folder to Google Drive

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  upload-to-drive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install rclone
        run: sudo apt-get install -y rclone

      - name: Upload ApkFile Folder to Google Drive
        env:
          GDRIVE_SA_KEY: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_KEY }}
        run: |
          # Write service account key
          echo "$GDRIVE_SA_KEY" > /tmp/sa_key.json

          # Create rclone config
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << EOF
[gdrive]
type = drive
service_account_file = /tmp/sa_key.json
root_folder_id = 1ZE5bxcjgUTVRtdUS-BwWqgZkANQEDC0T
EOF

          # Upload ApkFile folder
          rclone copy ApkFile/ gdrive: --progress

          # Clean up
          rm -f /tmp/sa_key.json
