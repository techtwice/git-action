name: Upload APK Folder to Google Drive

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  upload-to-drive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install rclone
        run: sudo apt-get install -y rclone

      - name: Upload ApkFile Folder to Google Drive
        env:
          GDRIVE_SA_KEY: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_KEY }}
        run: |
          echo "$GDRIVE_SA_KEY" > /tmp/sa_key.json

          mkdir -p ~/.config/rclone
          printf '[gdrive]\ntype = drive\nservice_account_file = /tmp/sa_key.json\nroot_folder_id = 1ZE5bxcjgUTVRtdUS-BwWqgZkANQEDC0T\n' > ~/.config/rclone/rclone.conf

          rclone copy ApkFile/ gdrive: --progress

          rm -f /tmp/sa_key.json
